<style>
  body {
    margin:0;
    background:#000;
    color:white;
    font-family:Arial, sans-serif;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    transition:background 0.3s;
  }
  #msg {
    position:absolute;
    top:15%;
    font-size:2.8rem;
    text-align:center;
    padding:0 20px;
    max-width:90%;
    z-index:1;
  }
  #btn {
    background:red;
    color:white;
    border:none;
    padding:100px 140px;
    font-size:5rem;
    font-weight:bold;
    border-radius:40px;
    cursor:pointer;
    z-index:2;
  }
  #btn:active {transform:scale(0.95)}
  #btn.hidden {display:none}
  .crack {
    position:fixed;
    top:0;left:0;width:100%;height:100%;
    background:repeating-linear-gradient(45deg,transparent,transparent 20px,white 21px,transparent 22px),
               repeating-linear-gradient(-45deg,transparent,transparent 20px,white 21px,transparent 22px);
    pointer-events:none;
    z-index:999;
    opacity:0;
  }
  .crack.show {opacity:0.4}
  .boom {font-size:12rem;animation:shake 0.15s infinite}
  @keyframes shake {
    0%{transform:translate(0,0)}25%{transform:translate(8px,4px)}
    50%{transform:translate(0,0)}75%{transform:translate(-8px,4px)}
    100%{transform:translate(0,0)}
  }
  .red {background:#300}
</style>
</head>
<body>
